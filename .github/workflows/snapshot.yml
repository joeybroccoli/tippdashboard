name: Tippgruppe Snapshot

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhaengigkeiten installieren
        run: pip install requests beautifulsoup4

      - name: Snapshot erstellen
        run: python scraper.py

      - name: Aenderungen committen
        run: |
          git config user.name "Tippgruppe Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Taeglicher Snapshot"
          git push
